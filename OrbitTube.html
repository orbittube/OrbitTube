<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚀 OrbitTube</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== ВСЕ СТИЛИ (ПОЛНАЯ ВЕРСИЯ) ===== */
        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-card: #1a1a1a;
            --bg-hover: #272727;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --text-muted: #606060;
            --border-color: #303030;
            --accent: #00d4ff;
            --shadow: rgba(0, 0, 0, 0.5);
            --sidebar-width: 240px;
            --header-height: 56px;
            --radius: 12px;
            --transition: 0.3s ease;
        }

        [data-theme="light"] {
            --bg-primary: #f9f9f9;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-hover: #e5e5e5;
            --text-primary: #0f0f0f;
            --text-secondary: #606060;
            --text-muted: #909090;
            --border-color: #d9d9d9;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        [data-theme="cosmic"] {
            --bg-primary: #0b0e17;
            --bg-secondary: #121a26;
            --bg-card: #121a26;
            --bg-hover: #1a2636;
            --text-primary: #e0e6f0;
            --text-secondary: #7a8a9e;
            --text-muted: #4a5a6e;
            --border-color: #1f2a3a;
            --accent: #00d4ff;
            --shadow: rgba(0, 0, 0, 0.7);
        }

        [data-bg="dark"] { --bg-primary: #0f0f0f; --bg-secondary: #1a1a1a; }
        [data-bg="darker"] { --bg-primary: #000000; --bg-secondary: #0a0a0a; }
        [data-bg="gray"] { --bg-primary: #1a1a1a; --bg-secondary: #2a2a2a; }
        [data-bg="blue"] { --bg-primary: #0a1628; --bg-secondary: #0f2040; }
        [data-bg="purple"] { --bg-primary: #1a0a2e; --bg-secondary: #2a1040; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background var(--transition), color var(--transition);
            overflow: hidden;
            height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        /* ===== ШАПКА ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            height: var(--header-height);
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: background var(--transition), border var(--transition);
            gap: 8px;
            flex-shrink: 0;
        }

        .header-left { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .menu-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.2s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .menu-btn:hover { background: var(--bg-hover); }
        .logo {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            cursor: pointer;
        }
        .logo i { font-size: 20px; }
        .logo span {
            background: linear-gradient(135deg, var(--accent), #7b2ffc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-center {
            flex: 1;
            max-width: 400px;
            min-width: 60px;
            display: flex;
            align-items: center;
        }
        .search-box {
            display: flex;
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
            transition: border 0.3s, box-shadow 0.3s;
        }
        .search-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.2);
        }
        .search-box input {
            flex: 1;
            padding: 6px 12px;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 14px;
            min-width: 40px;
        }
        .search-box input::placeholder { color: var(--text-muted); font-size: 13px; }
        .search-box button {
            background: var(--bg-hover);
            border: none;
            padding: 6px 12px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .search-box button:hover { background: var(--border-color); }
        .header-right {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .header-right button {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: background 0.2s;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .header-right button:hover { background: var(--bg-hover); }
        .header-right .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 12px;
            color: #000;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .header-right .avatar:hover { opacity: 0.8; }

        /* ===== БОКОВОЕ МЕНЮ ===== */
        .sidebar {
            position: fixed;
            top: var(--header-height);
            left: 0;
            width: var(--sidebar-width);
            height: calc(100vh - var(--header-height));
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            overflow-x: hidden;
            transition: transform var(--transition), background var(--transition), border var(--transition);
            z-index: 999;
            padding: 8px 0;
            flex-shrink: 0;
            transform: translateX(-100%);
        }
        .sidebar.open {
            transform: translateX(0);
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 8px 16px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            border-radius: 0;
            margin: 1px 0;
            min-height: 40px;
            white-space: nowrap;
            border-left: 3px solid transparent;
        }
        .sidebar-item:hover { background: var(--bg-hover); color: var(--text-primary); }
        .sidebar-item.active {
            background: var(--bg-hover);
            color: var(--accent);
            border-left-color: var(--accent);
            font-weight: 500;
        }
        .sidebar-item i { width: 24px; font-size: 18px; text-align: center; flex-shrink: 0; }
        .sidebar-item span { overflow: hidden; text-overflow: ellipsis; }
        .sidebar-divider { height: 1px; background: var(--border-color); margin: 8px 12px; }
        .sidebar-divider-text {
            color: var(--text-muted);
            font-size: 11px;
            padding: 8px 16px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: var(--header-height);
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 998;
        }
        .sidebar-overlay.active {
            display: block;
        }

        /* ===== ОСНОВНОЙ КОНТЕНТ ===== */
        .main-content {
            margin-left: 0;
            margin-top: var(--header-height);
            padding: 12px 12px 60px;
            height: calc(100vh - var(--header-height));
            overflow-y: auto;
            transition: margin-left var(--transition), padding var(--transition);
            background: var(--bg-primary);
        }

        /* ===== ВИДЕО СЕТКА ===== */
        .video-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .video-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, background var(--transition);
            border: 1px solid transparent;
        }
        .video-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--shadow);
            border-color: var(--border-color);
        }
        .video-thumbnail {
            position: relative;
            background: var(--bg-hover);
            aspect-ratio: 16/9;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-thumbnail .duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.85);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            color: #fff;
            font-weight: 500;
        }
        .video-info {
            padding: 10px 12px;
            display: flex;
            gap: 10px;
        }
        .video-channel-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 13px;
            color: #000;
            cursor: pointer;
        }
        .video-details { flex: 1; min-width: 0; }
        .video-title {
            font-weight: 500;
            font-size: 14px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 3px;
        }
        .video-channel-name {
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .video-channel-name:hover {
            color: var(--accent);
            text-decoration: underline;
        }
        .video-meta {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            gap: 4px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* ===== НИЖНЯЯ НАВИГАЦИЯ ===== */
        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 54px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            z-index: 1000;
            padding: 0 8px;
            justify-content: space-around;
            align-items: center;
        }
        .bottom-nav.active {
            display: flex;
        }
        .bottom-nav button {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 8px;
            transition: color 0.2s, background 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            font-size: 12px;
        }
        .bottom-nav button i { font-size: 20px; }
        .bottom-nav button.active { color: var(--accent); }
        .bottom-nav button:hover { background: var(--bg-hover); }

        /* ===== НАСТРОЙКИ ===== */
        .settings-panel {
            position: fixed;
            top: var(--header-height);
            right: -100%;
            width: 100%;
            height: calc(100vh - var(--header-height));
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            transition: right 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 1001;
            padding: 16px;
            overflow-y: auto;
        }
        .settings-panel.open { right: 0; }
        .settings-panel h2 {
            font-size: 18px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .settings-panel h2 i { color: var(--accent); }
        .settings-group { margin-bottom: 16px; }
        .settings-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .theme-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }
        .theme-btn {
            padding: 8px 4px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
            text-align: center;
        }
        .theme-btn:hover { border-color: var(--text-secondary); }
        .theme-btn.active { border-color: var(--accent); background: var(--bg-hover); }
        .theme-btn i { display: block; font-size: 18px; margin-bottom: 2px; }
        .bg-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }
        .bg-btn {
            padding: 6px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            font-size: 11px;
            color: var(--text-primary);
            background: var(--bg-primary);
        }
        .bg-btn:hover { border-color: var(--text-secondary); }
        .bg-btn.active { border-color: var(--accent); }
        .bg-btn .color-preview {
            width: 100%;
            height: 24px;
            border-radius: 4px;
            margin-bottom: 3px;
            border: 1px solid var(--border-color);
        }
        .settings-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 22px;
            cursor: pointer;
        }
        .toggle-switch {
            position: relative;
            width: 40px;
            height: 20px;
            background: var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s;
            display: inline-block;
            flex-shrink: 0;
        }
        .toggle-switch.active { background: var(--accent); }
        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.3s;
        }
        .toggle-switch.active::after { transform: translateX(20px); }
        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
        }
        .settings-row span { font-size: 13px; }

        .footer {
            text-align: center;
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 12px;
            margin-top: 20px;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            grid-column: 1/-1;
        }
        .empty-state i { font-size: 40px; margin-bottom: 12px; display: block; color: var(--text-muted); }
        .empty-state h3 { color: var(--text-primary); margin-bottom: 4px; font-size: 18px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .video-card { animation: fadeIn 0.3s ease; }

        /* ===== АДАПТИВ ===== */
        @media (min-width: 768px) {
            .video-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }
            .bottom-nav { display: none !important; }
            .main-content { padding-bottom: 24px; }
            .sidebar {
                transform: translateX(0);
                width: var(--sidebar-width);
            }
            .sidebar.collapsed {
                transform: translateX(0);
                width: var(--sidebar-collapsed);
            }
            .sidebar.collapsed .sidebar-item span { display: none; }
            .sidebar.collapsed .sidebar-item { justify-content: center; padding: 12px; }
            .sidebar.collapsed .sidebar-divider-text { display: none; }
            .sidebar.collapsed .sidebar-section-title { display: none; }
            .main-content {
                margin-left: var(--sidebar-width);
                padding: 16px 20px 40px;
            }
            .main-content.expanded { margin-left: var(--sidebar-collapsed); }
            .sidebar-overlay { display: none !important; }
            .bottom-nav { display: none !important; }
            .settings-panel {
                width: 380px;
                right: -420px;
            }
            .settings-panel.open { right: 0; }
        }

        @media (min-width: 1024px) {
            .video-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
            }
        }

        @media (min-width: 1400px) {
            .video-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 24px;
            }
        }

        @media (max-width: 767px) {
            .bottom-nav {
                display: flex !important;
                background: var(--bg-secondary);
            }
            .main-content {
                padding-bottom: 70px;
            }
            .header-center { max-width: 200px; }
            .logo { font-size: 16px; }
            .logo i { font-size: 18px; }
            .search-box input { font-size: 12px; padding: 4px 8px; }
            .search-box button { padding: 4px 8px; font-size: 12px; }
            .header-right button { width: 32px; height: 32px; font-size: 16px; }
            .header-right .avatar { width: 24px; height: 24px; font-size: 10px; }
            .menu-btn { font-size: 18px; width: 36px; height: 36px; padding: 6px; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.active { display: block; }
            .settings-panel { width: 100%; right: -100%; }
            .settings-panel.open { right: 0; }
        }

        @media (max-width: 480px) {
            .video-grid { gap: 12px; }
            .video-title { font-size: 13px; }
            .video-info { padding: 8px 10px; gap: 8px; }
            .video-channel-avatar { width: 28px; height: 28px; font-size: 11px; }
        }
    </style>
</head>
<body>

    <!-- ===== ШАПКА ===== -->
    <header class="header">
        <div class="header-left">
            <button class="menu-btn" id="menuToggle"><i class="fas fa-bars"></i></button>
            <div class="logo" id="logoHome"><i class="fas fa-rocket"></i><span>OrbitTube</span></div>
        </div>
        <div class="header-center">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск в OrbitTube">
                <button id="searchBtn"><i class="fas fa-search"></i></button>
            </div>
        </div>
        <div class="header-right">
            <button id="settingsBtn"><i class="fas fa-cog"></i></button>
            <div class="avatar" id="avatarBtn">O</div>
        </div>
    </header>

    <!-- ===== ОВЕРЛЕЙ ===== -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ===== БОКОВОЕ МЕНЮ ===== -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-item active" data-page="home"><i class="fas fa-home"></i><span>Главная</span></div>
        <div class="sidebar-item" data-page="trending"><i class="fas fa-fire"></i><span>Тренды</span></div>
        <div class="sidebar-item" data-page="subscriptions"><i class="fas fa-users"></i><span>Подписки</span></div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-item" data-page="library"><i class="fas fa-book"></i><span>Библиотека</span></div>
        <div class="sidebar-item" data-page="history"><i class="fas fa-history"></i><span>История</span></div>
        <div class="sidebar-item" data-page="watch_later"><i class="fas fa-clock"></i><span>Смотреть позже</span></div>
        <div class="sidebar-item" data-page="liked"><i class="fas fa-thumbs-up"></i><span>Понравившиеся</span></div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-divider-text">Подписки</div>
        <div id="subscriptionsList"></div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-item" data-page="settings"><i class="fas fa-cog"></i><span>Настройки</span></div>
    </nav>

    <!-- ===== ОСНОВНОЙ КОНТЕНТ ===== -->
    <main class="main-content" id="mainContent">
        <div class="video-grid" id="videoGrid"></div>
        <div class="footer">
            <p>🚀 OrbitTube — видео, которое нельзя заблокировать</p>
            <p>📡 Видео хранятся на GitHub</p>
        </div>
    </main>

    <!-- ===== НАСТРОЙКИ ===== -->
    <div class="settings-panel" id="settingsPanel">
        <button class="settings-close" id="settingsClose"><i class="fas fa-times"></i></button>
        <h2><i class="fas fa-cog"></i> Настройки</h2>
        <div class="settings-group">
            <label>🎨 Тема</label>
            <div class="theme-options">
                <button class="theme-btn active" data-theme="dark"><i class="fas fa-moon"></i>Тёмная</button>
                <button class="theme-btn" data-theme="light"><i class="fas fa-sun"></i>Светлая</button>
                <button class="theme-btn" data-theme="cosmic"><i class="fas fa-rocket"></i>Космос</button>
            </div>
        </div>
        <div class="settings-group">
            <label>🎨 Цвет фона</label>
            <div class="bg-options">
                <button class="bg-btn active" data-bg="dark"><div class="color-preview" style="background:#0f0f0f;"></div>Тёмный</button>
                <button class="bg-btn" data-bg="darker"><div class="color-preview" style="background:#000000;"></div>Чёрный</button>
                <button class="bg-btn" data-bg="gray"><div class="color-preview" style="background:#1a1a1a;"></div>Серый</button>
                <button class="bg-btn" data-bg="blue"><div class="color-preview" style="background:#0a1628;"></div>Синий</button>
                <button class="bg-btn" data-bg="purple"><div class="color-preview" style="background:#1a0a2e;"></div>Фиолетовый</button>
            </div>
        </div>
        <div class="settings-group" style="border-top:1px solid var(--border-color);padding-top:12px;">
            <label>ℹ️ О проекте</label>
            <p style="color:var(--text-secondary);font-size:12px;line-height:1.5;"><strong>OrbitTube</strong> — свободная платформа.</p>
            <p style="color:var(--text-muted);font-size:11px;margin-top:4px;">Версия 5.0 · Сделано с ❤️</p>
        </div>
    </div>

    <!-- ===== НИЖНЯЯ НАВИГАЦИЯ ===== -->
    <div class="bottom-nav" id="bottomNav">
        <button class="active" data-page="home"><i class="fas fa-home"></i><span>Главная</span></button>
        <button data-page="subscriptions"><i class="fas fa-users"></i><span>Подписки</span></button>
        <button data-page="watch_later"><i class="fas fa-clock"></i><span>Закладки</span></button>
        <button data-page="settings"><i class="fas fa-cog"></i><span>Настройки</span></button>
    </div>

    <!-- ===== JAVASCRIPT ===== -->
    <script>
        // ===== ПЕРЕМЕННЫЕ =====
        let allVideos = [];
        let currentVideos = [];
        let currentPage = 'home';

        let likedVideos = JSON.parse(localStorage.getItem('orbittube_liked') || '[]');
        let watchLater = JSON.parse(localStorage.getItem('orbittube_watchlater') || '[]');
        let history = JSON.parse(localStorage.getItem('orbittube_history') || '[]');
        let subscriptions = JSON.parse(localStorage.getItem('orbittube_subscriptions') || '[]');

        // ===== ЗАГРУЗКА ВИДЕО =====
        async function loadVideos() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/reallyvisualsofficial-pixel/OrbitTube/refs/heads/main/video.raw?v=' + Date.now());
                if (!response.ok) throw new Error('File not found');
                const data = await response.json();
                allVideos = data.videos || [];
                allVideos.forEach((v, i) => {
                    v.views = v.views || Math.floor(Math.random() * 100000) + 100;
                    v.duration = v.duration || '10:00';
                    v.channel = v.channel || 'Неизвестный канал';
                    v.thumbnail = v.thumbnail || '';
                    v.description = v.description || 'Описание отсутствует';
                    v.subscribers = v.subscribers || Math.floor(Math.random() * 1000000) + 1000;
                });
                renderPage(currentPage);
                updateSubscriptionsSidebar();
            } catch (e) {
                console.warn('Ошибка загрузки video.raw:', e);
                allVideos = [];
                renderPage(currentPage);
            }
        }

        // ===== РЕНДЕР =====
        function renderPage(page) {
            currentPage = page;
            let videos = [];

            switch (page) {
                case 'home': videos = allVideos; break;
                case 'trending': videos = [...allVideos].sort((a, b) => (b.views || 0) - (a.views || 0)); break;
                case 'subscriptions': videos = allVideos.filter(v => subscriptions.includes(v.channel)); break;
                case 'library': videos = allVideos.filter(v => history.includes(v.id)); break;
                case 'history': videos = allVideos.filter(v => history.includes(v.id)); break;
                case 'watch_later': videos = allVideos.filter(v => watchLater.includes(v.id)); break;
                case 'liked': videos = allVideos.filter(v => likedVideos.includes(v.id)); break;
                default: videos = allVideos;
            }

            currentVideos = videos;
            renderVideos(videos, page);
            updateSubscriptionsSidebar();
            updateBottomNav();
        }

        function renderVideos(videos, page) {
            const grid = document.getElementById('videoGrid');
            if (!videos || videos.length === 0) {
                grid.innerHTML = `<div class="empty-state"><i class="fas fa-video-slash"></i><h3>Здесь пока пусто</h3><p>В этой категории нет видео</p></div>`;
                return;
            }

            const cards = videos.map((video, index) => {
                const isLiked = likedVideos.includes(video.id);
                const isWatchLater = watchLater.includes(video.id);
                const hasThumbnail = video.thumbnail && video.thumbnail.startsWith('http');
                return `
                    <div class="video-card" onclick="openVideo(${video.id})">
                        <div class="video-thumbnail">
                            ${hasThumbnail ?
                                `<img src="${video.thumbnail}" alt="${video.title}" loading="lazy" onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=\\'display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-muted);\\'><i class=\\'fas fa-rocket\\' style=\\'font-size:32px;\\'></i><span style=\\'margin-top:4px;font-weight:bold;font-size:14px;\\'>OrbitTube</span></div>'">` :
                                `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-muted);">
                                    <i class="fas fa-rocket" style="font-size:32px;"></i>
                                    <span style="margin-top:4px;font-weight:bold;font-size:14px;">OrbitTube</span>
                                 </div>`
                            }
                            <span class="duration">${video.duration || '10:00'}</span>
                            ${isLiked ? '<span style="position:absolute;top:6px;right:6px;background:var(--accent);color:#000;padding:1px 6px;border-radius:10px;font-size:9px;font-weight:bold;"><i class="fas fa-thumbs-up"></i></span>' : ''}
                            ${isWatchLater ? '<span style="position:absolute;top:6px;left:6px;background:#ffaa44;color:#000;padding:1px 6px;border-radius:10px;font-size:9px;font-weight:bold;"><i class="fas fa-clock"></i></span>' : ''}
                        </div>
                        <div class="video-info">
                            <div class="video-channel-avatar" onclick="event.stopPropagation(); openChannel('${video.channel}')">${(video.channel || 'O')[0].toUpperCase()}</div>
                            <div class="video-details">
                                <div class="video-title">${video.title || 'Без названия'}</div>
                                <div class="video-channel-name" onclick="event.stopPropagation(); openChannel('${video.channel}')">${video.channel || 'OrbitTube'}</div>
                                <div class="video-meta"><span>${formatViews(video.views || 0)} просмотров</span></div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            grid.innerHTML = cards;

            document.querySelectorAll('.sidebar-item[data-page]').forEach(el => {
                el.classList.toggle('active', el.dataset.page === page);
            });
        }

        function formatViews(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        // ===== ОТКРЫТЬ ВИДЕО =====
        function openVideo(videoId) {
            window.location.href = `video.html?v=${videoId}`;
        }

        // ===== ПОДПИСКИ =====
        function toggleSubscribe(channelName) {
            const index = subscriptions.indexOf(channelName);
            if (index > -1) {
                subscriptions.splice(index, 1);
            } else {
                subscriptions.push(channelName);
            }
            localStorage.setItem('orbittube_subscriptions', JSON.stringify(subscriptions));
            updateSubscriptionsSidebar();
            if (currentPage === 'subscriptions') {
                renderPage('subscriptions');
            }
        }

        function openChannel(channelName) {
            if (!channelName) return;
            // Временно просто показываем все видео, фильтруем
            const filtered = allVideos.filter(v => v.channel === channelName);
            if (filtered.length > 0) {
                currentVideos = filtered;
                renderVideos(filtered, 'channel');
                document.getElementById('searchInput').value = '';
                closeSidebar();
            }
        }

        function updateSubscriptionsSidebar() {
            const container = document.getElementById('subscriptionsList');
            if (!container) return;
            if (subscriptions.length === 0) {
                container.innerHTML = `<div style="padding:8px 16px;color:var(--text-muted);font-size:12px;">Нет подписок</div>`;
                return;
            }
            container.innerHTML = subscriptions.map(ch => `
                <div class="sidebar-item" onclick="openChannel('${ch}')">
                    <i class="fas fa-user"></i><span>${ch}</span>
                </div>
            `).join('');
        }

        // ===== ПОИСК =====
        function searchVideos() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!query) { renderPage(currentPage); return; }
            const filtered = allVideos.filter(v => v.title.toLowerCase().includes(query) || (v.channel && v.channel.toLowerCase().includes(query)));
            currentVideos = filtered;
            renderVideos(filtered, 'search');
        }

        // ===== МЕНЮ =====
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const isOpen = sidebar.classList.toggle('open');
            overlay.classList.toggle('active', isOpen);
        }

        function closeSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.remove('open');
            overlay.classList.remove('active');
        }

        // ===== НИЖНЯЯ НАВИГАЦИЯ =====
        function updateBottomNav() {
            document.querySelectorAll('.bottom-nav button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.page === currentPage);
            });
        }

        // ===== НАСТРОЙКИ =====
        function openSettings() { document.getElementById('settingsPanel').classList.add('open'); closeSidebar(); }
        function closeSettings() { document.getElementById('settingsPanel').classList.remove('open'); }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            document.querySelectorAll('.theme-btn').forEach(el => el.classList.toggle('active', el.dataset.theme === theme));
            localStorage.setItem('orbittube_theme', theme);
        }

        function setBg(bg) {
            document.documentElement.setAttribute('data-bg', bg);
            document.querySelectorAll('.bg-btn').forEach(el => el.classList.toggle('active', el.dataset.bg === bg));
            localStorage.setItem('orbittube_bg', bg);
        }

        function loadSettings() {
            const theme = localStorage.getItem('orbittube_theme') || 'dark';
            const bg = localStorage.getItem('orbittube_bg') || 'dark';
            setTheme(theme);
            setBg(bg);
        }

        // ===== ОБРАБОТЧИКИ =====
        document.addEventListener('DOMContentLoaded', function() {
            loadSettings();
            loadVideos();

            document.getElementById('menuToggle').addEventListener('click', toggleSidebar);
            document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

            document.getElementById('logoHome').addEventListener('click', function() {
                document.getElementById('searchInput').value = '';
                closeSidebar();
                renderPage('home');
            });

            document.getElementById('searchBtn').addEventListener('click', searchVideos);
            document.getElementById('searchInput').addEventListener('keyup', function(e) { if (e.key === 'Enter') searchVideos(); });

            document.getElementById('settingsBtn').addEventListener('click', openSettings);
            document.getElementById('settingsClose').addEventListener('click', closeSettings);

            document.querySelectorAll('.sidebar-item[data-page], .bottom-nav button[data-page]').forEach(item => {
                item.addEventListener('click', function() {
                    const page = this.dataset.page;
                    if (page === 'settings') { openSettings(); closeSidebar(); return; }
                    closeSidebar();
                    renderPage(page);
                    document.getElementById('searchInput').value = '';
                });
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeSettings();
                    closeSidebar();
                }
            });

            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.addEventListener('click', function() { setTheme(this.dataset.theme); });
            });

            document.querySelectorAll('.bg-btn').forEach(btn => {
                btn.addEventListener('click', function() { setBg(this.dataset.bg); });
            });

            document.querySelectorAll('.toggle-switch').forEach(toggle => {
                toggle.addEventListener('click', function() { this.classList.toggle('active'); });
            });

            document.getElementById('avatarBtn').addEventListener('click', openSettings);

            setInterval(loadVideos, 2 * 60 * 1000);

            console.log('🚀 OrbitTube v5.0');
        });
    </script>
</body>
</html>
