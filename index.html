<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚀 OrbitTube</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Все стили остаются без изменений (как в предыдущей версии) */
        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-card: #1a1a1a;
            --bg-hover: #272727;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --text-muted: #606060;
            --border-color: #303030;
            --accent: #00d4ff;
            --shadow: rgba(0, 0, 0, 0.5);
            --sidebar-width: 240px;
            --sidebar-collapsed: 0px;
            --header-height: 56px;
            --radius: 12px;
            --transition: 0.3s ease;
        }

        [data-theme="light"] {
            --bg-primary: #f9f9f9;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-hover: #e5e5e5;
            --text-primary: #0f0f0f;
            --text-secondary: #606060;
            --text-muted: #909090;
            --border-color: #d9d9d9;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        [data-theme="cosmic"] {
            --bg-primary: #0b0e17;
            --bg-secondary: #121a26;
            --bg-card: #121a26;
            --bg-hover: #1a2636;
            --text-primary: #e0e6f0;
            --text-secondary: #7a8a9e;
            --text-muted: #4a5a6e;
            --border-color: #1f2a3a;
            --accent: #00d4ff;
            --shadow: rgba(0, 0, 0, 0.7);
        }

        [data-bg="dark"] { --bg-primary: #0f0f0f; --bg-secondary: #1a1a1a; }
        [data-bg="darker"] { --bg-primary: #000000; --bg-secondary: #0a0a0a; }
        [data-bg="gray"] { --bg-primary: #1a1a1a; --bg-secondary: #2a2a2a; }
        [data-bg="blue"] { --bg-primary: #0a1628; --bg-secondary: #0f2040; }
        [data-bg="purple"] { --bg-primary: #1a0a2e; --bg-secondary: #2a1040; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background var(--transition), color var(--transition);
            overflow: hidden;
            height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            height: var(--header-height);
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: background var(--transition), border var(--transition);
            gap: 8px;
            flex-shrink: 0;
        }

        .header-left { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
        .menu-btn {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.2s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .menu-btn:hover { background: var(--bg-hover); }
        .logo {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            cursor: pointer;
        }
        .logo i { font-size: 20px; }
        .logo span {
            background: linear-gradient(135deg, var(--accent), #7b2ffc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-center {
            flex: 1;
            max-width: 400px;
            min-width: 60px;
            display: flex;
            align-items: center;
        }
        .search-box {
            display: flex;
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
            transition: border 0.3s, box-shadow 0.3s;
        }
        .search-box:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.2);
        }
        .search-box input {
            flex: 1;
            padding: 6px 12px;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 14px;
            min-width: 40px;
        }
        .search-box input::placeholder { color: var(--text-muted); font-size: 13px; }
        .search-box button {
            background: var(--bg-hover);
            border: none;
            padding: 6px 12px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .search-box button:hover { background: var(--border-color); }

        .header-right {
            display: flex;
            align-items: center;
            gap: 4px;
            flex-shrink: 0;
        }
        .header-right button {
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 18px;
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: background 0.2s;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .header-right button:hover { background: var(--bg-hover); }

        .sidebar {
            position: fixed;
            top: var(--header-height);
            left: 0;
            width: var(--sidebar-width);
            height: calc(100vh - var(--header-height));
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            overflow-x: hidden;
            transition: transform var(--transition), background var(--transition), border var(--transition);
            z-index: 999;
            padding: 8px 0;
            flex-shrink: 0;
            transform: translateX(-100%);
        }
        .sidebar.open { transform: translateX(0); }

        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 8px 16px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            border-radius: 0;
            margin: 1px 0;
            min-height: 40px;
            white-space: nowrap;
            border-left: 3px solid transparent;
        }
        .sidebar-item:hover { background: var(--bg-hover); color: var(--text-primary); }
        .sidebar-item.active {
            background: var(--bg-hover);
            color: var(--accent);
            border-left-color: var(--accent);
            font-weight: 500;
        }
        .sidebar-item i { width: 24px; font-size: 18px; text-align: center; flex-shrink: 0; }
        .sidebar-item span { overflow: hidden; text-overflow: ellipsis; }
        .sidebar-divider { height: 1px; background: var(--border-color); margin: 8px 12px; }
        .sidebar-divider-text {
            color: var(--text-muted);
            font-size: 11px;
            padding: 8px 16px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: var(--header-height);
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 998;
        }
        .sidebar-overlay.active { display: block; }

        .main-content {
            margin-left: 0;
            margin-top: var(--header-height);
            padding: 12px 12px 80px;
            height: calc(100vh - var(--header-height));
            overflow-y: auto;
            transition: margin-left var(--transition), padding var(--transition);
            background: var(--bg-primary);
        }

        .video-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .video-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, background var(--transition);
            border: 1px solid transparent;
        }
        .video-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px var(--shadow);
            border-color: var(--border-color);
        }
        .video-thumbnail {
            position: relative;
            background: var(--bg-hover);
            aspect-ratio: 16/9;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        .video-thumbnail .duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.85);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            color: #fff;
            font-weight: 500;
        }
        .video-info {
            padding: 10px 12px;
            display: flex;
            gap: 10px;
        }
        .video-channel-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            color: #000;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .video-details { flex: 1; min-width: 0; }
        .video-title {
            font-weight: 500;
            font-size: 14px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 3px;
        }
        .video-channel-name {
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .video-channel-name:hover { color: var(--accent); text-decoration: underline; }
        .video-meta {
            font-size: 12px;
            color: var(--text-secondary);
            display: flex;
            gap: 4px;
            align-items: center;
            flex-wrap: wrap;
        }

        .channel-header {
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .channel-avatar-big {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            color: #000;
            background-size: cover;
            background-position: center;
            position: relative;
            flex-shrink: 0;
        }
        .channel-info h1 {
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .channel-info .subs {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .channel-subscribe-btn {
            background: var(--accent);
            border: none;
            color: #000;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
            margin-left: auto;
        }
        .channel-subscribe-btn.subscribed {
            background: var(--border-color);
            color: var(--text-secondary);
        }
        .channel-subscribe-btn:hover { transform: scale(1.05); }
        .channel-verified-badge {
            color: #00d4ff;
            font-size: 18px;
        }
        .back-to-home {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            padding: 8px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }
        .back-to-home:hover { color: var(--text-primary); }

        .channel-videos-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-secondary);
        }

        .verified-badge-small {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 14px;
            height: 14px;
            background: #00d4ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            color: #fff;
            border: 2px solid var(--bg-secondary);
        }

        .bottom-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 54px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            z-index: 1000;
            padding: 0 8px;
            justify-content: space-around;
            align-items: center;
        }
        .bottom-nav.active { display: flex; }
        .bottom-nav button {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 8px;
            transition: color 0.2s, background 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            font-size: 12px;
        }
        .bottom-nav button i { font-size: 20px; }
        .bottom-nav button.active { color: var(--accent); }
        .bottom-nav button:hover { background: var(--bg-hover); }

        .footer {
            text-align: center;
            padding: 20px 20px 30px;
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
            font-size: 12px;
            margin-top: 24px;
            clear: both;
            width: 100%;
        }

        .settings-panel {
            position: fixed;
            top: var(--header-height);
            right: -420px;
            width: 400px;
            height: calc(100vh - var(--header-height));
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-color);
            transition: right 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 1001;
            padding: 24px;
            overflow-y: auto;
        }
        .settings-panel.open { right: 0; }

        .settings-panel h2 {
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .settings-panel h2 i { color: var(--accent); }

        .settings-group { margin-bottom: 24px; }
        .settings-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .theme-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .theme-btn {
            padding: 10px 8px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            text-align: center;
        }
        .theme-btn:hover { border-color: var(--text-secondary); }
        .theme-btn.active { border-color: var(--accent); background: var(--bg-hover); }
        .theme-btn i { display: block; font-size: 20px; margin-bottom: 4px; }

        .bg-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }
        .bg-btn {
            padding: 8px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            font-size: 12px;
            color: var(--text-primary);
            background: var(--bg-primary);
        }
        .bg-btn:hover { border-color: var(--text-secondary); }
        .bg-btn.active { border-color: var(--accent); }
        .bg-btn .color-preview {
            width: 100%;
            height: 30px;
            border-radius: 4px;
            margin-bottom: 4px;
            border: 1px solid var(--border-color);
        }

        .settings-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 24px;
            cursor: pointer;
        }

        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            background: var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s;
            display: inline-block;
            flex-shrink: 0;
        }
        .toggle-switch.active { background: var(--accent); }
        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.3s;
        }
        .toggle-switch.active::after { transform: translateX(20px); }

        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }

        .lang-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .lang-btn {
            padding: 6px 14px;
            border: 2px solid var(--border-color);
            border-radius: 20px;
            background: var(--bg-primary);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
        }
        .lang-btn:hover { border-color: var(--text-secondary); }
        .lang-btn.active { border-color: var(--accent); background: var(--bg-hover); }

        @media (min-width: 768px) {
            .video-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }
            .bottom-nav { display: none !important; }
            .main-content { padding-bottom: 40px; }
            .sidebar {
                transform: translateX(0);
                width: var(--sidebar-width);
            }
            .sidebar.collapsed {
                transform: translateX(0);
                width: var(--sidebar-collapsed);
            }
            .sidebar.collapsed .sidebar-item span { display: none; }
            .sidebar.collapsed .sidebar-item { justify-content: center; padding: 12px; }
            .sidebar.collapsed .sidebar-divider-text { display: none; }
            .sidebar.collapsed .sidebar-section-title { display: none; }
            .main-content {
                margin-left: var(--sidebar-width);
                padding: 16px 20px 40px;
            }
            .main-content.expanded { margin-left: var(--sidebar-collapsed); }
            .sidebar-overlay { display: none !important; }
            .bottom-nav { display: none !important; }
            .settings-panel {
                width: 380px;
                right: -420px;
            }
            .settings-panel.open { right: 0; }
        }

        @media (min-width: 1024px) {
            .video-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 20px;
            }
        }

        @media (min-width: 1400px) {
            .video-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 24px;
            }
        }

        @media (max-width: 767px) {
            .bottom-nav { display: flex !important; }
            .main-content { padding-bottom: 80px; }
            .header-center { max-width: 200px; }
            .logo { font-size: 16px; }
            .logo i { font-size: 18px; }
            .search-box input { font-size: 12px; padding: 4px 8px; }
            .search-box button { padding: 4px 8px; font-size: 12px; }
            .header-right button { width: 32px; height: 32px; font-size: 16px; }
            .menu-btn { font-size: 18px; width: 36px; height: 36px; padding: 6px; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.active { display: block; }
            .settings-panel {
                width: 100%;
                right: -100%;
            }
            .settings-panel.open { right: 0; }
            .channel-header { flex-direction: column; align-items: flex-start; }
            .channel-info h1 { font-size: 20px; }
            .channel-subscribe-btn { margin-left: 0; }
        }

        @media (max-width: 480px) {
            .video-grid { gap: 12px; }
            .video-title { font-size: 13px; }
            .video-info { padding: 8px 10px; gap: 8px; }
            .video-channel-avatar { width: 28px; height: 28px; font-size: 11px; }
            .channel-avatar-big { width: 48px; height: 48px; font-size: 20px; }
            .channel-info h1 { font-size: 17px; }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            grid-column: 1/-1;
        }
        .empty-state i { font-size: 40px; margin-bottom: 12px; display: block; color: var(--text-muted); }
        .empty-state h3 { color: var(--text-primary); margin-bottom: 4px; font-size: 18px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-left">
            <button class="menu-btn" id="menuToggle"><i class="fas fa-bars"></i></button>
            <div class="logo" id="logoHome"><i class="fas fa-rocket"></i><span>OrbitTube</span></div>
        </div>
        <div class="header-center">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск в OrbitTube">
                <button id="searchBtn"><i class="fas fa-search"></i></button>
            </div>
        </div>
        <div class="header-right">
            <button id="settingsBtn"><i class="fas fa-cog"></i></button>
        </div>
    </header>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <nav class="sidebar" id="sidebar">
        <div class="sidebar-item active" data-page="home"><i class="fas fa-home"></i><span>Главная</span></div>
        <div class="sidebar-item" data-page="trending"><i class="fas fa-fire"></i><span>Тренды</span></div>
        <div class="sidebar-item" data-page="subscriptions"><i class="fas fa-users"></i><span>Подписки</span></div>
        <div class="sidebar-item" data-page="channels"><i class="fas fa-list"></i><span>Все каналы</span></div>
        <div class="sidebar-item" data-page="new_videos"><i class="fas fa-bolt"></i><span>Новые видео</span></div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-item" data-page="library"><i class="fas fa-book"></i><span>Библиотека</span></div>
        <div class="sidebar-item" data-page="watch_later"><i class="fas fa-clock"></i><span>Смотреть позже</span></div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-divider-text">Подписки</div>

        let currentLang = localStorage.getItem('orbittube_lang') || 'ru';

        // ========== Глобальные данные ==========
        let allVideos = [];
        let currentVideos = [];
        let currentPage = 'home';
        let currentChannel = null;
        let userSubscriptions = [];
        let userLiked = [];
        let userWatchLater = [];
        let viewHistory = [];

        const SERVER_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:8080' 
            : 'https://unruffled-unfrosted-name.ngrok-free.dev';

        // ========== Функции перевода (без изменений) ==========
        function t(key) {
            const langData = LANG[currentLang] || LANG.ru;
            return langData[key] || key;
        }

        function applyLanguage() {
            document.title = '🚀 OrbitTube';
            document.querySelector('.logo span').textContent = 'OrbitTube';
            document.getElementById('searchInput').placeholder = t('search_placeholder');
            
            const navItems = document.querySelectorAll('.sidebar-item[data-page], .bottom-nav button[data-page]');
            const pageMap = {
                home: 'home',
                trending: 'trending',
                subscriptions: 'subscriptions',
                channels: 'channels',
                new_videos: 'new_videos',
                library: 'library',
                watch_later: 'watch_later',
                settings: 'settings'
            };
            navItems.forEach(el => {
                const page = el.dataset.page;
                if (pageMap[page]) {
                    const span = el.querySelector('span');
                    if (span) span.textContent = t(pageMap[page]);
                }
            });
            const subDivider = document.querySelector('.sidebar-divider-text');
            if (subDivider) subDivider.textContent = t('subscriptions');
            
            const backBtn = document.getElementById('backToHome');
            if (backBtn) backBtn.innerHTML = `<i class="fas fa-arrow-left"></i> ${t('back_home')}`;
            
            const footer = document.querySelector('.footer');
            if (footer) {
                footer.innerHTML = `
                    <p>${t('footer_line1')}</p>
                    <p>${t('footer_line2')}</p>
                `;
            }
            
            document.querySelector('#settingsPanel h2').innerHTML = `<i class="fas fa-cog"></i> ${t('settings_title')}`;
            const settingsLabels = document.querySelectorAll('.settings-group label');
            if (settingsLabels.length >= 5) {
                settingsLabels[0].textContent = t('lang_label');
                settingsLabels[1].textContent = t('theme_label');
                settingsLabels[2].textContent = t('bg_label');
                settingsLabels[3].textContent = t('interface_label');
                settingsLabels[4].textContent = t('about_label');
            }
            const rows = document.querySelectorAll('.settings-row');
            if (rows.length >= 2) {
                const spans = rows[0].querySelectorAll('span');
                if (spans[0]) spans[0].textContent = t('auto_collapse');
                const spans2 = rows[1].querySelectorAll('span');
                if (spans2[0]) spans2[0].textContent = t('auto_play');
            }
            const aboutP = document.querySelector('.settings-group p');
            if (aboutP) {
                aboutP.innerHTML = `<strong>OrbitTube</strong> — ${t('about_text')}`;
            }
            const versionP = document.querySelector('.settings-group p:last-child');
            if (versionP && versionP.style.color === 'var(--text-muted)') {
                versionP.textContent = t('version');
            }
            document.querySelectorAll('.theme-btn').forEach(btn => {
                const theme = btn.dataset.theme;
                const label = t(theme) || theme;
                const icon = btn.querySelector('i');
                if (icon) {
                    btn.innerHTML = `${icon.outerHTML} ${label}`;
                }
            });
            document.querySelectorAll('.bg-btn').forEach(btn => {
                const bg = btn.dataset.bg;
                const label = t('bg_' + bg) || bg;
                const preview = btn.querySelector('.color-preview');
                if (preview) {
                    btn.innerHTML = `${preview.outerHTML} ${label}`;
                }
            });
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === currentLang);
            });
            renderPage(currentPage, currentChannel);
            updateSubscriptionsSidebar();
            updateBottomNav();
        }

        // ========== Загрузка данных ==========
        function loadUserData() {
            const saved = localStorage.getItem('orbittube_user');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    userSubscriptions = data.subscriptions || [];
                    userLiked = data.liked_videos || [];
                    userWatchLater = data.watch_later || [];
                    viewHistory = data.history || [];
                } catch (e) {}
            }
        }

        function saveUserData() {
            localStorage.setItem('orbittube_user', JSON.stringify({
                subscriptions: userSubscriptions,
                liked_videos: userLiked,
                watch_later: userWatchLater,
                history: viewHistory
            }));
        }

        // ===== НОВАЯ ФУНКЦИЯ: извлечение ID видео из URL =====
        function extractVideoId(url) {
            if (!url) return null;
            // Попробуем найти v= или youtu.be/
            let match = url.match(/[?&]v=([^&]+)/);
            if (match) return match[1];
            match = url.match(/youtu\.be\/([^?]+)/);
            if (match) return match[1];
            return null;
        }

        // ===== НОВАЯ ФУНКЦИЯ: получение URL превью =====
        function getThumbnailUrl(video) {
            // Если есть собственное поле thumbnail — используем его
            if (video.thumbnail && video.thumbnail.startsWith('http')) {
                return video.thumbnail;
            }
            // Иначе пробуем вытащить ID из original_url
            const id = extractVideoId(video.original_url);
            if (id) {
                return `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
            }
            // Если ничего не вышло — заглушка (data:image)
            return 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 90" fill="%23ccc"%3E%3Crect width="160" height="90" /%3E%3Ctext x="50%25" y="50%25" text-anchor="middle" dy=".3em" fill="%23666"%3E🎬%3C/text%3E%3C/svg%3E';
        }

        async function loadVideos() {
            try {
                loadUserData();
                const response = await fetch('https://raw.githubusercontent.com/orbittube/OrbitTube/refs/heads/main/video.raw?v=' + Date.now());
                if (!response.ok) throw new Error('File not found');
                const data = await response.json();
                allVideos = data.videos || [];
                
                for (let i = 0; i < allVideos.length; i++) {
                    const v = allVideos[i];
                    try {
                        const channelRes = await fetch(`${SERVER_URL}/channel/${v.channel}`);
                        if (channelRes.ok) {
                            const channelData = await channelRes.json();
                            v.subscribers = channelData.subscribers || 0;
                            v.channel_verified = channelData.verified || false;
                        }
                    } catch (e) {}
                }
                
                renderPage(currentPage, currentChannel);
                updateSubscriptionsSidebar();
            } catch (e) {
                console.warn('Ошибка загрузки:', e);
                allVideos = [];
                renderPage(currentPage, currentChannel);
            }
        }

        // ========== Перемешивание и дата ==========
        function shuffleArray(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function parseDateAdd(dateString) {
            if (!dateString || typeof dateString !== 'string') return null;
            const trimmed = dateString.trim();
            if (trimmed.includes('-')) {
                const normalized = trimmed.replace(/\.(\d{3})\d+/, '.$1Z');
                const date = new Date(normalized);
                return isNaN(date.getTime()) ? null : date;
            }
            const parts = trimmed.split('.');
            if (parts.length !== 3) return null;
            const month = parseInt(parts[0], 10);
            const day = parseInt(parts[1], 10);
            const year = parseInt(parts[2], 10);
            if ([month, day, year].some(v => Number.isNaN(v))) return null;
            return new Date(year, month - 1, day);
        }

        function isRecentVideo(video) {
            const date = parseDateAdd(video.date_add || video.added || video.added_date);
            if (!date) return false;
            const now = new Date();
            const diffMs = now - date;
            if (diffMs < 0) return false;
            const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            return diffDays >= 1 && diffDays <= 10;
        }

        function renderPage(page, channelName) {
            currentPage = page;
            document.getElementById('backToHome').style.display = page === 'channel' ? 'flex' : 'none';
            
            if (page !== 'channel' && page !== 'channels') {
                document.getElementById('pageContent').innerHTML = '<div class="video-grid" id="videoGrid"></div>';
            }
            
            if (page === 'channels') {
                renderAllChannels();
                return;
            }
            
            if (page === 'channel' && channelName) {
                renderChannelPage(channelName);
                return;
            }
            
            let videos = [];
            switch (page) {
                case 'home': 
                    videos = shuffleArray(allVideos);
                    break;
                case 'trending': 
                    videos = [...allVideos].sort((a, b) => (b.views || 0) - (a.views || 0)); 
                    break;
                case 'subscriptions': 
                    videos = shuffleArray(allVideos.filter(v => userSubscriptions.includes(v.channel))); 
                    break;
                case 'new_videos':
                    videos = [...allVideos]
                        .filter(isRecentVideo)
                        .sort((a, b) => parseDateAdd(b.date_add || b.added || b.added_date) - parseDateAdd(a.date_add || a.added || a.added_date));
                    break;
                case 'library': 
                    videos = shuffleArray(allVideos.filter(v => userLiked.includes(v.id) || userWatchLater.includes(v.id))); 
                    break;
                case 'watch_later': 
                    videos = shuffleArray(allVideos.filter(v => userWatchLater.includes(v.id))); 
                    break;
                default: 
                    videos = shuffleArray(allVideos);
            }

            currentVideos = videos;
            renderVideos(videos);
            updateSubscriptionsSidebar();
            updateBottomNav();
        }

        // ===== Рендеринг с использованием новой функции превью =====
        function renderVideos(videos) {
            const grid = document.getElementById('videoGrid');
            if (!grid) return;
            
            if (!videos || videos.length === 0) {
                grid.innerHTML = `<div class="empty-state"><i class="fas fa-video-slash"></i><h3>${t('no_videos')}</h3><p>${t('no_videos_desc')}</p></div>`;
                return;
            }

            const cards = videos.map((video, index) => {
                const isLiked = userLiked.includes(video.id);
                const isWatchLater = userWatchLater.includes(video.id);
                // Используем новую функцию получения превью
                const thumbUrl = getThumbnailUrl(video);
                const subscribers = video.subscribers || 0;
                const isVerified = video.channel_verified || false;
                const views = video.views || 0;
                const likes = video.likes || 0;
                
                return `
                    <div class="video-card" onclick="openVideo(${video.id})">
                        <div class="video-thumbnail">
                            <img src="${thumbUrl}" alt="${video.title}" loading="lazy" onerror="this.style.display='none'; this.parentElement.innerHTML='<div style=\\'display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-muted);\\'><i class=\\'fas fa-rocket\\' style=\\'font-size:32px;\\'></i><span style=\\'margin-top:4px;font-weight:bold;font-size:14px;\\'>OrbitTube</span></div>'">
                            <span class="duration">${video.duration || '10:00'}</span>
                            ${isLiked ? '<span style="position:absolute;top:6px;right:6px;background:var(--accent);color:#000;padding:1px 6px;border-radius:10px;font-size:9px;font-weight:bold;"><i class="fas fa-thumbs-up"></i></span>' : ''}
                            ${isWatchLater ? '<span style="position:absolute;top:6px;left:6px;background:#ffaa44;color:#000;padding:1px 6px;border-radius:10px;font-size:9px;font-weight:bold;"><i class="fas fa-clock"></i></span>' : ''}
                        </div>
                        <div class="video-info">
                            <div class="video-channel-avatar" onclick="event.stopPropagation(); openChannel('${video.channel}')">
                                ${video.channel ? video.channel.charAt(0).toUpperCase() : 'O'}
                                ${isVerified ? '<span class="verified-badge-small"><i class="fas fa-check"></i></span>' : ''}
                            </div>
                            <div class="video-details">
                                <div class="video-title">${video.title || 'Без названия'}</div>
                                <div class="video-channel-name" onclick="event.stopPropagation(); openChannel('${video.channel}')">${video.channel || 'OrbitTube'} ${isVerified ? '<i class="fas fa-check-circle" style="color:#00d4ff;font-size:11px;"></i>' : ''}</div>
                                <div class="video-meta">
                                    <span>${formatViews(views)} ${t('views')}</span>
                                    <span>•</span>
                                    <span>❤️ ${likes}</span>
                                    <span>•</span>
                                    <span>${formatViews(subscribers)} ${t('subscribers')}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            grid.innerHTML = cards;

            document.querySelectorAll('.sidebar-item[data-page]').forEach(el => {
                el.classList.toggle('active', el.dataset.page === currentPage);
            });
        }

        function formatViews(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function renderAllChannels() {
            const pageContent = document.getElementById('pageContent');
            const channels = [];
            const channelMap = {};
            
            allVideos.forEach(v => {
                if (v.channel && !channelMap[v.channel]) {
                    channelMap[v.channel] = {
                        name: v.channel,
                        subscribers: v.subscribers || 0,
                        verified: v.channel_verified || false
                    };
                }
            });
            
            const channelList = Object.values(channelMap).sort((a, b) => a.name.localeCompare(b.name));
            
            if (channelList.length === 0) {
                pageContent.innerHTML = `<div class="empty-state"><i class="fas fa-users"></i><h3>${t('no_channels')}</h3><p>${t('no_channels_desc')}</p></div>`;
                return;
            }

            pageContent.innerHTML = `
                <div style="margin-bottom:16px; padding: 0 4px;">
                    <div style="font-size:18px;font-weight:600;margin-bottom:8px;">${t('all_channels_title')} (${channelList.length})</div>
                    <div style="font-size:13px;color:var(--text-secondary);">${t('all_channels_sub')}</div>
                </div>
                <div class="video-grid" id="videoGrid">
                    ${channelList.map(ch => `
                        <div class="video-card" onclick="openChannel('${ch.name}')" style="padding:12px 16px;display:flex;align-items:center;gap:14px;grid-column: 1/-1;">
                            <div class="video-channel-avatar" style="width:48px;height:48px;font-size:20px;flex-shrink:0;">
                                ${ch.name.charAt(0).toUpperCase()}
                                ${ch.verified ? '<span class="verified-badge-small"><i class="fas fa-check"></i></span>' : ''}
                            </div>
                            <div style="flex:1;">
                                <div style="font-size:16px;font-weight:500;">${ch.name} ${ch.verified ? '<i class="fas fa-check-circle" style="color:#00d4ff;font-size:14px;"></i>' : ''}</div>
                                <div style="font-size:13px;color:var(--text-secondary);">${formatViews(ch.subscribers)} ${t('subscribers')}</div>
                            </div>
                            <div style="color:var(--text-muted);"><i class="fas fa-chevron-right"></i></div>
                        </div>
                    `).join('')}
                </div>
            `;

            document.querySelectorAll('.sidebar-item[data-page]').forEach(el => {
                el.classList.toggle('active', el.dataset.page === currentPage);
            });
        }

        // ===== Рендеринг канала с превью =====
        function renderChannelPage(channelName) {
            const pageContent = document.getElementById('pageContent');
            const videos = allVideos.filter(v => v.channel === channelName);
            const channel = allVideos.find(v => v.channel === channelName);
            const isSubscribed = userSubscriptions.includes(channelName);
            const subscribers = channel ? channel.subscribers || 0 : 0;
            const isVerified = channel ? channel.channel_verified || false : false;

            if (videos.length === 0) {
                pageContent.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-user"></i>
                        <h3>${channelName}</h3>
                        <p>${t('empty_channel')}</p>
                    </div>
                `;
                return;
            }

            let html = `
                <div class="channel-header">
                    <div class="channel-avatar-big">
                        ${channelName.charAt(0).toUpperCase()}
                        ${isVerified ? '<span class="verified-badge-small"><i class="fas fa-check"></i></span>' : ''}
                    </div>
                    <div class="channel-info">
                        <h1>${channelName} ${isVerified ? '<span class="channel-verified-badge"><i class="fas fa-check-circle"></i></span>' : ''}</h1>
                        <div class="subs">${formatViews(subscribers)} ${t('subscribers')} · ${videos.length} ${t('video')}</div>
                    </div>
                    <button class="channel-subscribe-btn ${isSubscribed ? 'subscribed' : ''}" onclick="toggleSubscribeFromChannel('${channelName}')">
                        ${isSubscribed ? '✅ ' + t('subscribed') : '➕ ' + t('subscribe')}
                    </button>
                </div>
                <div class="channel-videos-title">🎬 ${t('channel_videos')}</div>
                <div class="video-grid" id="videoGrid">
            `;

            videos.forEach(video => {
                const isLiked = userLiked.includes(video.id);
                const isWatchLater = userWatchLater.includes(video.id);
                const thumbUrl = getThumbnailUrl(video);
                const views = video.views || 0;
                const likes = video.likes || 0;
                
                html += `
                    <div class="video-card" onclick="openVideo(${video.id})">
                        <div class="video-thumbnail">
                            <img src="${thumbUrl}" alt="${video.title}" loading="lazy" onerror="this.style.display='none'; this.parentElement.innerHTML='<i class=\\'fas fa-play-circle\\' style=\\'font-size:48px;color:var(--text-muted);\\'></i>'">
                            <span class="duration">${video.duration || '10:00'}</span>
                            ${isLiked ? '<span style="position:absolute;top:6px;right:6px;background:var(--accent);color:#000;padding:1px 6px;border-radius:10px;font-size:9px;font-weight:bold;"><i class="fas fa-thumbs-up"></i></span>' : ''}
                            ${isWatchLater ? '<span style="position:absolute;top:6px;left:6px;background:#ffaa44;color:#000;padding:1px 6px;border-radius:10px;font-size:9px;font-weight:bold;"><i class="fas fa-clock"></i></span>' : ''}
                        </div>
                        <div class="video-info">
                            <div class="video-channel-avatar" onclick="event.stopPropagation(); openChannel('${video.channel}')">
                                ${video.channel ? video.channel.charAt(0).toUpperCase() : 'O'}
                            </div>
                            <div class="video-details">
                                <div class="video-title">${video.title || 'Без названия'}</div>
                                <div class="video-channel-name" onclick="event.stopPropagation(); openChannel('${video.channel}')">${video.channel || 'OrbitTube'}</div>
                                <div class="video-meta">
                                    <span>${formatViews(views)} ${t('views')}</span>
                                    <span>•</span>
                                    <span>❤️ ${likes}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += `</div>`;

            pageContent.innerHTML = html;
            document.querySelectorAll('.sidebar-item[data-page]').forEach(el => {
                el.classList.toggle('active', el.dataset.page === currentPage);
            });
        }

        function openChannel(channelName) {
            if (!channelName) return;
            currentChannel = channelName;
            document.getElementById('backToHome').style.display = 'flex';
            renderPage('channel', channelName);
            closeSidebar();
            updateBottomNav();
        }

        function toggleSubscribeFromChannel(channelName) {
            const wasSubscribed = userSubscriptions.includes(channelName);
            if (wasSubscribed) {
                userSubscriptions = userSubscriptions.filter(ch => ch !== channelName);
            } else {
                userSubscriptions.push(channelName);
            }
            saveUserData();
            updateSubscriptionsSidebar();
            renderChannelPage(channelName);
            
            const subBtn = document.querySelector('.channel-subscribe-btn');
            if (subBtn) {
                const isSub = userSubscriptions.includes(channelName);
                subBtn.className = `channel-subscribe-btn ${isSub ? 'subscribed' : ''}`;
                subBtn.textContent = isSub ? '✅ ' + t('subscribed') : '➕ ' + t('subscribe');
            }
        }

        function toggleSubscribe(channelName) {
            const wasSubscribed = userSubscriptions.includes(channelName);
            if (wasSubscribed) {
                userSubscriptions = userSubscriptions.filter(ch => ch !== channelName);
            } else {
                userSubscriptions.push(channelName);
            }
            saveUserData();
            updateSubscriptionsSidebar();
            loadVideos();
        }

        function updateSubscriptionsSidebar() {
            const container = document.getElementById('subscriptionsList');
            if (!container) return;
            if (userSubscriptions.length === 0) {
                container.innerHTML = `<div style="padding:8px 16px;color:var(--text-muted);font-size:12px;">${t('no_subscriptions')}</div>`;
                return;
            }
            container.innerHTML = userSubscriptions.map(ch => `
                <div class="sidebar-item" onclick="openChannel('${ch}')">
                    <i class="fas fa-user"></i><span>${ch}</span>
                </div>
            `).join('');
        }

        function openVideo(videoId) {
            window.location.href = `video.html?v=${videoId}`;
        }

        function searchVideos() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!query) { renderPage(currentPage, currentChannel); return; }
            
            document.getElementById('pageContent').innerHTML = '<div class="video-grid" id="videoGrid"></div>';
            
            const filtered = allVideos.filter(v => v.title.toLowerCase().includes(query) || (v.channel && v.channel.toLowerCase().includes(query)));
            currentVideos = filtered;
            renderVideos(filtered);
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const isOpen = sidebar.classList.toggle('open');
            overlay.classList.toggle('active', isOpen);
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('active');
        }

        function openSettings() { 
            document.getElementById('settingsPanel').classList.add('open');
            closeSidebar();
        }

        function closeSettings() { 
            document.getElementById('settingsPanel').classList.remove('open');
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            document.querySelectorAll('.theme-btn').forEach(el => el.classList.toggle('active', el.dataset.theme === theme));
            localStorage.setItem('orbittube_theme', theme);
        }

        function setBg(bg) {
            document.documentElement.setAttribute('data-bg', bg);
            document.querySelectorAll('.bg-btn').forEach(el => el.classList.toggle('active', el.dataset.bg === bg));
            localStorage.setItem('orbittube_bg', bg);
        }

        function setLang(lang) {
            if (!LANG[lang]) return;
            currentLang = lang;
            localStorage.setItem('orbittube_lang', lang);
            applyLanguage();
        }

        function loadSettings() {
            const theme = localStorage.getItem('orbittube_theme') || 'dark';
            const bg = localStorage.getItem('orbittube_bg') || 'dark';
            const lang = localStorage.getItem('orbittube_lang') || 'ru';
            currentLang = lang;
            setTheme(theme);
            setBg(bg);
            applyLanguage();
        }

        function updateBottomNav() {
            document.querySelectorAll('.bottom-nav button').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.page === currentPage);
            });
        }

        // ========== Инициализация ==========
        document.addEventListener('DOMContentLoaded', function() {
            loadSettings();
            loadVideos();

            document.getElementById('menuToggle').addEventListener('click', toggleSidebar);
            document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

            document.getElementById('logoHome').addEventListener('click', function() {
                document.getElementById('searchInput').value = '';
                closeSidebar();
                currentChannel = null;
                document.getElementById('backToHome').style.display = 'none';
                renderPage('home');
            });

            document.getElementById('backToHome').addEventListener('click', function() {
                document.getElementById('searchInput').value = '';
                currentChannel = null;
                document.getElementById('backToHome').style.display = 'none';
                renderPage('home');
            });

            document.getElementById('searchBtn').addEventListener('click', searchVideos);
            document.getElementById('searchInput').addEventListener('keyup', function(e) { if (e.key === 'Enter') searchVideos(); });

            document.getElementById('settingsBtn').addEventListener('click', openSettings);
            document.getElementById('settingsClose').addEventListener('click', closeSettings);

            document.querySelectorAll('.sidebar-item[data-page], .bottom-nav button[data-page]').forEach(item => {
                item.addEventListener('click', function() {
                    const page = this.dataset.page;
                    if (page === 'settings') { openSettings(); closeSidebar(); return; }
                    closeSidebar();
                    document.getElementById('searchInput').value = '';
                    currentChannel = null;
                    document.getElementById('backToHome').style.display = 'none';
                    renderPage(page);
                });
            });

            document.querySelectorAll('.theme-btn').forEach(btn => {
                btn.addEventListener('click', function() { setTheme(this.dataset.theme); });
            });

            document.querySelectorAll('.bg-btn').forEach(btn => {
                btn.addEventListener('click', function() { setBg(this.dataset.bg); });
            });

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.addEventListener('click', function() { setLang(this.dataset.lang); });
            });

            document.querySelectorAll('.toggle-switch').forEach(toggle => {
                toggle.addEventListener('click', function() { this.classList.toggle('active'); });
            });

            document.getElementById('autoCollapseToggle').addEventListener('click', function() {
                if (this.classList.contains('active')) {
                    document.getElementById('sidebar').classList.add('collapsed');
                    document.getElementById('mainContent').classList.add('expanded');
                } else {
                    document.getElementById('sidebar').classList.remove('collapsed');
                    document.getElementById('mainContent').classList.remove('expanded');
                }
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeSettings();
                    closeSidebar();
                }
            });

            setInterval(loadVideos, 2 * 60 * 1000);
            console.log('🚀 OrbitTube v1.0 загружен!');
        });
    </script>
</body>
</html>
