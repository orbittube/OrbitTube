<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚀 OrbitTube — плеер</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== СТИЛИ ===== */
        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-card: #1a1a1a;
            --bg-hover: #272727;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --text-muted: #606060;
            --border-color: #303030;
            --accent: #00d4ff;
            --shadow: rgba(0, 0, 0, 0.5);
            --radius: 12px;
            --transition: 0.3s ease;
        }

        [data-theme="light"] {
            --bg-primary: #f9f9f9;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-hover: #e5e5e5;
            --text-primary: #0f0f0f;
            --text-secondary: #606060;
            --text-muted: #909090;
            --border-color: #d9d9d9;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        [data-theme="cosmic"] {
            --bg-primary: #0b0e17;
            --bg-secondary: #121a26;
            --bg-card: #121a26;
            --bg-hover: #1a2636;
            --text-primary: #e0e6f0;
            --text-secondary: #7a8a9e;
            --text-muted: #4a5a6e;
            --border-color: #1f2a3a;
            --accent: #00d4ff;
            --shadow: rgba(0, 0, 0, 0.7);
        }

        [data-bg="dark"] { --bg-primary: #0f0f0f; --bg-secondary: #1a1a1a; }
        [data-bg="darker"] { --bg-primary: #000000; --bg-secondary: #0a0a0a; }
        [data-bg="gray"] { --bg-primary: #1a1a1a; --bg-secondary: #2a2a2a; }
        [data-bg="blue"] { --bg-primary: #0a1628; --bg-secondary: #0f2040; }
        [data-bg="purple"] { --bg-primary: #1a0a2e; --bg-secondary: #2a1040; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background var(--transition), color var(--transition);
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            height: 56px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: background var(--transition), border var(--transition);
            flex-shrink: 0;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.2s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .back-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
        .logo {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            cursor: pointer;
        }
        .logo i { font-size: 20px; }
        .logo span {
            background: linear-gradient(135deg, var(--accent), #7b2ffc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .player-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px 20px;
        }

        /* ===== ПЛЕЕР ===== */
        .custom-player {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: var(--radius);
            overflow: hidden;
            aspect-ratio: 16/9;
            user-select: none;
        }

        .custom-player video {
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
        }

        .player-title-overlay {
            position: absolute;
            top: 12px;
            left: 16px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
            z-index: 10;
            max-width: 70%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Добавлены стили для ссылки на канал внутри оверлея видео */
        .player-channel-link-overlay {
            color: inherit;
            text-decoration: none;
            cursor: pointer;
        }
        .player-channel-link-overlay:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        .player-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 14px;
            z-index: 5;
            display: none;
            text-align: center;
        }

        .player-loading.active {
            display: block;
        }

        .player-loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: var(--accent, #00d4ff);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .player-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 8px 12px 10px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .custom-player:hover .player-controls,
        .custom-player.show-controls .player-controls {
            opacity: 1;
        }

        .player-controls button {
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 6px;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 36px;
            min-height: 36px;
        }

        .player-controls button:hover {
            transform: scale(1.1);
        }

        .progress-container {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 60px;
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
            transition: height 0.2s;
        }

        .progress-bar:hover {
            height: 6px;
        }

        .progress-bar .progress-filled {
            height: 100%;
            background: var(--accent, #00d4ff);
            border-radius: 2px;
            width: 0%;
            transition: width 0.1s linear;
        }

        .progress-bar .progress-buffer {
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            position: absolute;
            top: 0;
            left: 0;
            width: 0%;
        }

        .progress-bar .progress-thumb {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 14px;
            height: 14px;
            background: var(--accent, #00d4ff);
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.5);
            pointer-events: none;
            left: 0%;
            transition: left 0.1s linear;
        }

        .progress-bar:hover .progress-thumb {
            width: 16px;
            height: 16px;
        }

        .time-display {
            color: #fff;
            font-size: 13px;
            font-family: monospace;
            min-width: 80px;
            text-align: center;
            opacity: 0.8;
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .volume-slider {
            width: 0;
            overflow: hidden;
            transition: width 0.3s ease;
            appearance: none;
            background: rgba(255, 255, 255, 0.3);
            height: 4px;
            border-radius: 2px;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent, #00d4ff);
            cursor: pointer;
        }

        .volume-container:hover .volume-slider {
            width: 60px;
        }

        .center-play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: 48px;
            cursor: pointer;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10;
            opacity: 0.8;
        }

        .center-play-btn:hover {
            transform: translate(-50%, -50%) scale(1.1);
            background: rgba(0, 0, 0, 0.8);
            opacity: 1;
        }

        .center-play-btn.hidden {
            opacity: 0;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .player-title-overlay { font-size: 13px; top: 8px; left: 12px; }
            .player-controls button { font-size: 16px; min-width: 28px; min-height: 28px; }
            .time-display { font-size: 11px; min-width: 60px; }
            .center-play-btn { width: 60px; height: 60px; font-size: 36px; }
        }

        @media (max-width: 480px) {
            .player-title-overlay { font-size: 11px; top: 6px; left: 10px; max-width: 60%; }
            .player-controls { padding: 4px 8px 6px; gap: 4px; }
            .player-controls button { font-size: 14px; min-width: 24px; min-height: 24px; padding: 2px 4px; }
            .time-display { font-size: 10px; min-width: 50px; }
            .center-play-btn { width: 50px; height: 50px; font-size: 28px; }
        }

        .player-info {
            padding: 16px 0;
        }
        .player-title-text {
            font-size: 20px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 8px;
        }
        .player-channel-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }
        .player-channel-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .player-channel-avatar-big {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: #000;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .player-channel-name-click {
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
        }
        .player-channel-name-click:hover {
            color: var(--accent);
            text-decoration: underline;
        }
        .player-channel-subscribers-text { font-size: 13px; color: var(--text-secondary); }
        .player-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .player-actions button {
            background: var(--bg-hover);
            border: none;
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .player-actions button:hover { background: var(--border-color); }
        .player-actions button.subscribed { background: var(--accent); color: #000; }
        .player-description {
            background: var(--bg-secondary);
            padding: 12px 16px;
            border-radius: var(--radius);
            margin-top: 12px;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-secondary);
            white-space: pre-wrap;
            border: 1px solid var(--border-color);
        }

        .player-right {
            margin-top: 16px;
        }
        .player-right::-webkit-scrollbar { width: 6px; }
        .player-right::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        .recommended-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-secondary);
        }
        .recommended-item {
            display: flex;
            gap: 12px;
            padding: 8px;
            cursor: pointer;
            transition: background 0.2s;
            border-radius: 8px;
        }
        .recommended-item:hover { background: var(--bg-hover); }
        .recommended-thumbnail {
            flex-shrink: 0;
            width: 168px;
            aspect-ratio: 16/9;
            background: var(--bg-hover);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .recommended-thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        .recommended-info { flex: 1; min-width: 0; }
        .recommended-title-text {
            font-size: 14px;
            font-weight: 500;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 4px;
        }
        .recommended-channel { font-size: 13px; color: var(--text-secondary); }
        .recommended-meta { font-size: 13px; color: var(--text-secondary); }

        .error-box {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            max-width: 600px;
            margin: 40px auto;
        }
        .error-box i { font-size: 60px; margin-bottom: 20px; display: block; color: #ff4444; }
        .error-box h2 { color: var(--text-primary); margin-bottom: 12px; }
        .error-box .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 24px;
            background: var(--accent);
            color: #000;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
        }

        @media (min-width: 768px) {
            .player-layout {
                display: grid;
                grid-template-columns: 1fr 340px;
                gap: 20px;
            }
            .player-right { margin-top: 0; }
        }

        @media (min-width: 1024px) {
            .player-layout {
                grid-template-columns: 1fr 380px;
                gap: 24px;
            }
        }

        @media (max-width: 767px) {
            .player-container { padding: 12px; }
            .player-title-text { font-size: 17px; }
            .player-channel-row { flex-direction: column; align-items: flex-start; }
            .player-actions { width: 100%; justify-content: flex-start; }
            .recommended-thumbnail { width: 120px; }
        }

        @media (max-width: 480px) {
            .player-container { padding: 8px; }
            .player-title-text { font-size: 15px; }
            .recommended-thumbnail { width: 100px; }
            .player-actions button { font-size: 12px; padding: 4px 10px; }
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            grid-column: 1/-1;
        }
        .empty-state i { font-size: 48px; margin-bottom: 20px; display: block; color: var(--text-muted); }
        .empty-state h3 { color: var(--text-primary); margin-bottom: 8px; }

        .back-to-home {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            padding: 8px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
            margin-bottom: 12px;
        }
        .back-to-home:hover { color: var(--text-primary); }
        .verified-badge-small {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 14px;
            height: 14px;
            background: #00d4ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            color: #fff;
            border: 2px solid var(--bg-secondary);
        }
    </style>
</head>
<body>

    <header class="header">
        <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
        <div class="logo" id="logoHome"><i class="fas fa-rocket"></i><span>OrbitTube</span></div>
    </header>

    <div class="player-container" id="playerContainer">
        <div id="playerContent"></div>
    </div>

    <script>
        // ===== ПЕРЕМЕННЫЕ =====
        let allVideos = [];
        let currentVideo = null;
        let userSubscriptions = [];
        let userWatchLater = [];

        const SERVER_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:8080' 
            : 'https://unruffled-unfrosted-name.ngrok-free.dev';

        // ===== РАБОТА С LOCALSTORAGE =====
        function loadUserData() {
            const saved = localStorage.getItem('orbittube_user');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    userSubscriptions = data.subscriptions || [];
                    userWatchLater = data.watch_later || [];
                } catch (e) {}
            }
        }

        function saveUserData() {
            localStorage.setItem('orbittube_user', JSON.stringify({
                subscriptions: userSubscriptions,
                watch_later: userWatchLater
            }));
        }

        function getVideoIdFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('v');
        }

        // ===== ЗАГРУЗКА ВИДЕО =====
        async function loadAllVideos() {
            try {
                loadUserData();
                const response = await fetch('https://raw.githubusercontent.com/reallyvisualsofficial-pixel/OrbitTube/refs/heads/main/video.raw?v=' + Date.now());
                if (!response.ok) throw new Error('File not found');
                const data = await response.json();
                allVideos = data.videos || [];
                return allVideos;
            } catch (e) {
                console.warn('Ошибка загрузки video.raw:', e);
                return [];
            }
        }

        function findVideoById(id) {
            return allVideos.find(v => v.id === parseInt(id));
        }

        function formatViews(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        function showError() {
            document.getElementById('playerContent').innerHTML = `
                <div class="error-box">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h2>❌ Видео не найдено</h2>
                    <p>Проверьте ссылку или вернитесь на главную.</p>
                    <a href="index.html" class="btn"><i class="fas fa-home"></i> На главную</a>
                </div>
            `;
        }

        // ===== РЕНДЕР ВИДЕО =====
        function renderVideo(video) {
            currentVideo = video;
            const isSubscribed = userSubscriptions.includes(video.channel);
            const isWatchLater = userWatchLater.includes(video.id);
            const isVerified = video.channel_verified || false;

            document.getElementById('playerContent').innerHTML = `
                <div class="player-layout">
                    <div>
                        <div class="custom-player" id="customPlayer">
                            <video id="playerVideo" preload="metadata"></video>
                            <!-- Название видео в плеере заменено на кликабельную ссылку на канал -->
                            <div class="player-title-overlay" id="playerTitleOverlay">
                                <span class="player-channel-link-overlay" onclick="openChannel('${video.channel}')">${video.channel || 'Без названия'}</span>
                            </div>
                            <div class="player-loading" id="playerLoading">
                                <div class="spinner"></div>
                                <span>Загрузка...</span>
                            </div>
                            <button class="center-play-btn" id="centerPlayBtn">
                                <i class="fas fa-play"></i>
                            </button>
                            <div class="player-controls" id="playerControls">
                                <button id="playBtn"><i class="fas fa-play"></i></button>
                                <div class="progress-container">
                                    <div class="progress-bar" id="progressBar">
                                        <div class="progress-buffer" id="progressBuffer"></div>
                                        <div class="progress-filled" id="progressFilled"></div>
                                        <div class="progress-thumb" id="progressThumb"></div>
                                    </div>
                                    <span class="time-display" id="timeDisplay">00:00 / 00:00</span>
                                </div>
                                <div class="volume-container">
                                    <button id="volumeBtn"><i class="fas fa-volume-up"></i></button>
                                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1">
                                </div>
                                <button id="fullscreenBtn"><i class="fas fa-expand"></i></button>
                            </div>
                        </div>

                        <div class="player-info">
                            <div class="player-title-text" id="playerTitle">${video.title || 'Без названия'}</div>
                            <div class="player-channel-row">
                                <div class="player-channel-info">
                                    <div class="player-channel-avatar-big" id="playerChannelAvatar" onclick="openChannel('${video.channel}')">
                                        ${video.channel ? video.channel.charAt(0).toUpperCase() : 'O'}
                                        ${isVerified ? '<span class="verified-badge-small"><i class="fas fa-check"></i></span>' : ''}
                                    </div>
                                    <div>
                                        <div class="player-channel-name-click" id="playerChannelName" onclick="openChannel('${video.channel}')">${video.channel || 'Неизвестный канал'}</div>
                                        <div class="player-channel-subscribers-text" id="playerSubscribers">${formatViews(video.subscribers || 0)} подписчиков</div>
                                    </div>
                                </div>
                                <div class="player-actions">
                                    <button id="playerWatchLater" onclick="toggleWatchLater()">
                                        <i class="fas fa-clock"></i> <span id="watchLaterText">${isWatchLater ? 'В сохранённых' : 'Смотреть позже'}</span>
                                    </button>
                                    <button id="playerSubscribe" class="${isSubscribed ? 'subscribed' : ''}" onclick="toggleSubscribe('${video.channel}')">
                                        <i class="fas ${isSubscribed ? 'fa-check' : 'fa-plus'}"></i> ${isSubscribed ? 'Подписан' : 'Подписаться'}
                                    </button>
                                </div>
                            </div>
                            <div class="player-description" id="playerDescription">${video.description || 'Описание отсутствует'}</div>
                        </div>
                    </div>

                    <div class="player-right">
                        <div class="recommended-title">Рекомендуемые видео</div>
                        <div id="recommendedList"></div>
                    </div>
                </div>
            `;

            // Загружаем видео
            const videoEl = document.getElementById('playerVideo');
            if (videoEl) {
                videoEl.src = video.temp_url || video.videoUrl || 'https://www.w3schools.com/html/mov_bbb.mp4';
                videoEl.load();
            }

            // Рекомендации
            const recommended = allVideos
                .filter(v => v.id !== video.id)
                .sort(() => Math.random() - 0.5)
                .slice(0, 10);

            const list = document.getElementById('recommendedList');
            if (recommended.length === 0) {
                list.innerHTML = '<div class="empty-state"><h3>Нет рекомендаций</h3></div>';
            } else {
                list.innerHTML = recommended.map(v => `
                    <div class="recommended-item" onclick="openVideo(${v.id})">
                        <div class="recommended-thumbnail">
                            <i class="fas fa-play-circle" style="font-size:32px;color:var(--text-muted);"></i>
                        </div>
                        <div class="recommended-info">
                            <div class="recommended-title-text">${v.title || 'Без названия'}</div>
                            <div class="recommended-channel">${v.channel || 'OrbitTube'}</div>
                            <div class="recommended-meta">${formatViews(v.views || 0)} просмотров</div>
                        </div>
                    </div>
                `).join('');
            }

            initCustomPlayer();
        }

        // ===== ЛОГИКА ПЛЕЕРА =====
        function initCustomPlayer() {
            const player = document.getElementById('customPlayer');
            const video = document.getElementById('playerVideo');
            const loading = document.getElementById('playerLoading');
            const centerPlayBtn = document.getElementById('centerPlayBtn');
            const playBtn = document.getElementById('playBtn');
            const progressBar = document.getElementById('progressBar');
            const progressFilled = document.getElementById('progressFilled');
            const progressBuffer = document.getElementById('progressBuffer');
            const progressThumb = document.getElementById('progressThumb');
            const timeDisplay = document.getElementById('timeDisplay');
            const volumeBtn = document.getElementById('volumeBtn');
            const volumeSlider = document.getElementById('volumeSlider');
            const fullscreenBtn = document.getElementById('fullscreenBtn');

            let controlsTimeout = null;
            let isPlaying = false;
            let isDragging = false;

            function formatTime(seconds) {
                if (!seconds || isNaN(seconds)) return '00:00';
                const h = Math.floor(seconds / 3600);
                const m = Math.floor((seconds % 3600) / 60);
                const s = Math.floor(seconds % 60);
                if (h > 0) {
                    return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
                }
                return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            }

            function updateProgress() {
                if (video.duration) {
                    const percent = (video.currentTime / video.duration) * 100;
                    progressFilled.style.width = `${percent}%`;
                    progressThumb.style.left = `${percent}%`;
                    timeDisplay.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
                }
            }

            function updateBuffer() {
                if (video.buffered.length > 0) {
                    const bufferedEnd = video.buffered.end(video.buffered.length - 1);
                    const percent = (bufferedEnd / video.duration) * 100;
                    progressBuffer.style.width = `${percent}%`;
                }
            }

            function togglePlay() {
                if (video.paused) video.play();
                else video.pause();
            }

            function updatePlayButton() {
                const icon = video.paused ? 'fa-play' : 'fa-pause';
                playBtn.querySelector('i').className = `fas ${icon}`;
                centerPlayBtn.querySelector('i').className = `fas ${icon}`;
                centerPlayBtn.classList.toggle('hidden', !video.paused);
                isPlaying = !video.paused;
                if (isPlaying) {
                    player.classList.add('show-controls');
                }
            }

            function toggleFullscreen() {
                if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                    if (player.requestFullscreen) player.requestFullscreen();
                    else if (player.webkitRequestFullscreen) player.webkitRequestFullscreen();
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                }
            }

            function toggleMute() {
                video.muted = !video.muted;
                volumeBtn.querySelector('i').className = `fas ${video.muted ? 'fa-volume-mute' : 'fa-volume-up'}`;
                volumeSlider.value = video.muted ? 0 : video.volume;
            }

            function updateVolume() {
                video.volume = parseFloat(volumeSlider.value);
                volumeBtn.querySelector('i').className = `fas ${video.volume === 0 ? 'fa-volume-mute' : 'fa-volume-up'}`;
                if (video.volume === 0) video.muted = true;
                else video.muted = false;
            }

            function showControls() {
                player.classList.add('show-controls');
                clearTimeout(controlsTimeout);
                if (isPlaying) {
                    controlsTimeout = setTimeout(() => {
                        if (!video.paused) player.classList.remove('show-controls');
                    }, 3000);
                }
            }

            function setVideoProgress(clientX) {
                if (!video.duration) return;
                const rect = progressBar.getBoundingClientRect();
                let percent = (clientX - rect.left) / rect.width;
                percent = Math.max(0, Math.min(1, percent));
                video.currentTime = percent * video.duration;
                updateProgress();
            }

            progressBar.addEventListener('click', (e) => {
                if (e.target === progressThumb) return;
                setVideoProgress(e.clientX);
            });

            progressBar.addEventListener('mousedown', (e) => {
                isDragging = true;
                video.pause();
                setVideoProgress(e.clientX);
            });

            document.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    setVideoProgress(e.clientX);
                }
            });

            document.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    if (isPlaying) {
                        video.play();
                    }
                }
            });

            video.addEventListener('loadedmetadata', () => {
                loading.classList.remove('active');
                timeDisplay.textContent = `00:00 / ${formatTime(video.duration)}`;
                updateProgress();
            });

            video.addEventListener('canplay', () => loading.classList.remove('active'));
            video.addEventListener('waiting', () => loading.classList.add('active'));
            video.addEventListener('playing', () => { loading.classList.remove('active'); updatePlayButton(); });
            video.addEventListener('pause', updatePlayButton);
            video.addEventListener('ended', updatePlayButton);
            video.addEventListener('timeupdate', () => { if (!isDragging) { updateProgress(); } updateBuffer(); });
            video.addEventListener('progress', updateBuffer);

            playBtn.addEventListener('click', togglePlay);
            centerPlayBtn.addEventListener('click', togglePlay);
            video.addEventListener('dblclick', toggleFullscreen);
            volumeBtn.addEventListener('click', toggleMute);
            volumeSlider.addEventListener('input', updateVolume);
            fullscreenBtn.addEventListener('click', toggleFullscreen);

            document.addEventListener('fullscreenchange', () => {
                const isFull = !!(document.fullscreenElement || document.webkitFullscreenElement);
                fullscreenBtn.querySelector('i').className = `fas ${isFull ? 'fa-compress' : 'fa-expand'}`;
            });

            document.addEventListener('webkitfullscreenchange', () => {
                const isFull = !!(document.fullscreenElement || document.webkitFullscreenElement);
                fullscreenBtn.querySelector('i').className = `fas ${isFull ? 'fa-compress' : 'fa-expand'}`;
            });

            player.addEventListener('mousemove', showControls);
            player.addEventListener('mouseleave', () => {
                if (isPlaying) {
                    setTimeout(() => {
                        if (!video.paused) player.classList.remove('show-controls');
                    }, 500);
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT') return;
                if (e.key === ' ' || e.key === 'Space') { e.preventDefault(); togglePlay(); }
                if (e.key === 'f' || e.key === 'F') toggleFullscreen();
                if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    video.currentTime = Math.min(video.currentTime + 5, video.duration);
                    updateProgress();
                }
                if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    video.currentTime = Math.max(video.currentTime - 5, 0);
                    updateProgress();
                }
            });

            updatePlayButton();
            console.log('🎬 Плеер готов!');
        }

        // ===== ФУНКЦИИ =====
        function openVideo(videoId) {
            window.location.href = `video.html?v=${videoId}`;
        
        }

        // ===== ПОДПИСКИ =====
        function toggleSubscribe(channelName) {
            const wasSubscribed = userSubscriptions.includes(channelName);
            if (wasSubscribed) {
                userSubscriptions = userSubscriptions.filter(ch => ch !== channelName);
            } else {
                userSubscriptions.push(channelName);
            }
            saveUserData();
            const btn = document.getElementById('playerSubscribe');
            if (btn) {
                const isSub = userSubscriptions.includes(channelName);
                btn.className = isSub ? 'subscribed' : '';
                btn.innerHTML = `<i class="fas ${isSub ? 'fa-check' : 'fa-plus'}"></i> ${isSub ? 'Подписан' : 'Подписаться'}`;
            }
        }

        // ===== СМОТРЕТЬ ПОЗЖЕ =====
        function toggleWatchLater() {
            if (!currentVideo) return;
            const id = currentVideo.id;
            const wasAdded = userWatchLater.includes(id);
            
            if (wasAdded) {
                userWatchLater = userWatchLater.filter(v => v !== id);
            } else {
                userWatchLater.push(id);
            }
            saveUserData();
            
            const btn = document.getElementById('watchLaterText');
            if (btn) {
                btn.textContent = userWatchLater.includes(id) ? 'В сохранённых' : 'Смотреть позже';
            }
        }

        // ===== ЗАПУСК =====
        async function init() {
            const theme = localStorage.getItem('orbittube_theme') || 'dark';
            const bg = localStorage.getItem('orbittube_bg') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            document.documentElement.setAttribute('data-bg', bg);

            await loadAllVideos();
            const id = getVideoIdFromURL();
            if (!id) { showError(); return; }
            const video = findVideoById(id);
            if (!video) { showError(); return; }
            renderVideo(video);
        }

        document.getElementById('backBtn').addEventListener('click', function() {
            window.location.href = 'index.html';
        });

        document.getElementById('logoHome').addEventListener('click', function() {
            window.location.href = 'index.html';
        });

        init();
    </script>
</body>
</html>
